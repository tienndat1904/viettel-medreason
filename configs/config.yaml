# Cấu hình pipeline — dùng path TƯƠNG ĐỐI để reproducible
seed: 42

paths:
  test_input: data/test/input        # BTC private test sẽ thay bằng --input
  output: output
  kb_icd: data/kb/icd10_vn.parquet
  kb_rxnorm: data/kb/rxnorm_scd.parquet
  icd_index: data/kb/icd10.faiss
  rxnorm_index: data/kb/rxnorm.faiss

extract:
  backend: rule                       # rule | llm
  llm_model: Qwen/Qwen2.5-7B-Instruct
  lora_adapter: models/qwen7b-lora    # để trống nếu chạy few-shot chưa fine-tune
  max_seq_len: 4096
  temperature: 0.0
  max_new_tokens: 2048

linking:
  embed_model: BAAI/bge-m3
  reranker_model: BAAI/bge-reranker-v2-m3
  icd_top_k_retrieve: 30
  icd_top_k_return: 3
  rxnorm_top_k_return: 1
  min_confidence: 0.30

labels:
  - TRIỆU_CHỨNG
  - TÊN_XÉT_NGHIỆM
  - KẾT_QUẢ_XÉT_NGHIỆM
  - CHẨN_ĐOÁN
  - THUỐC
