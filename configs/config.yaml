# Cấu hình pipeline — dùng path TƯƠNG ĐỐI để reproducible
seed: 42

paths:
  test_input: data/test/input        # BTC private test sẽ thay bằng --input
  output: output
  kb_icd: data/kb/icd10cm.parquet          # KB chính: ICD-10-CM song ngữ (khớp hệ mã gold)
  kb_icd_byt: data/kb/icd10_vn.parquet     # ICD-10 BYT (WHO) — nguồn tên tiếng Việt cho CM
  kb_rxnorm: data/kb/rxnorm_scd.parquet    # KB thật (build_rxnorm_kb.py)
  kb_icd_seed: data/kb/seed/icd10_vn.parquet     # seed nhỏ, fallback khi chưa build KB thật
  kb_rxnorm_seed: data/kb/seed/rxnorm_scd.parquet
  # semantic (T2): sinh bằng build_icd_index.py trên GPU (KHÔNG commit — lớn)
  icd_emb: data/kb/icd10cm_emb.npy
  icd_index_meta: data/kb/icd10cm_index_meta.parquet
  rxnorm_index: data/kb/rxnorm.faiss

extract:
  backend: rule                       # rule | llm
  assertion_mode: union               # replace | union | fill (assertion sau offset)
  llm_model: Qwen/Qwen2.5-3B-Instruct   # 3B: train/infer nhanh; fine-tune bù chất lượng. 7B cho bản cuối nếu cần
  lora_adapter: ""                    # để trống = few-shot chưa fine-tune; điền path adapter sau QLoRA
  max_seq_len: 4096
  temperature: 0.0
  max_new_tokens: 1536
  max_chunk_chars: 1800               # chunk theo dòng để tránh cắt output

linking:
  backend: lexical                    # lexical (v0, không GPU) | semantic (v1, bge-m3+reranker)
  icd_synonyms: data/kb/synonyms/icd_synonyms.tsv
  drug_brands: data/kb/synonyms/drug_brands.tsv        # brand map thủ công
  drug_brands_auto: data/kb/synonyms/drug_brands_auto.tsv  # brand map sinh từ RRF
  icd_fuzzy_threshold: 88             # rapidfuzz token_set_ratio (lexical)
  icd_hedge: false                    # BTC chấm Jaccard mã đầy đủ -> hedge làm tụt điểm (0.44->0.23); tắt
  rxnorm_fuzzy_threshold: 90          # sửa typo tên hoạt chất (lexical)
  # --- semantic (v1) ---
  embed_model: BAAI/bge-m3
  reranker_model: BAAI/bge-reranker-v2-m3
  icd_top_k_retrieve: 30
  icd_top_k_return: 3
  rxnorm_top_k_return: 2        # dev: k=1/2/3 cùng hit@k 0.915 -> chọn 2 (list ngắn, precision) + 1 hedge exact-code
  min_confidence: 0.30

labels:
  - TRIỆU_CHỨNG
  - TÊN_XÉT_NGHIỆM
  - KẾT_QUẢ_XÉT_NGHIỆM
  - CHẨN_ĐOÁN
  - THUỐC
